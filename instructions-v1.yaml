openapi: 3.0.4
info:
  title: instructions API
  description: API for instructions functionality.
  contact:
    name: Suva
    url: https://github.com/suva-ch/opencontent-api
    email: online-services.praevention@suva.ch
  license:
    name: Apache License 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  version: v1
servers:
  - url: https://www.suva.ch/contentApi
    description: PROD (Headless-Proxy)
  - url: https://intg.suva.ch/contentApi
    description: INTG (Headless-Proxy)
paths:
  /v1/Dsp/instructions:
    get:
      tags:
        - instructions
        - prevention
      summary: Get instructions
      description: Retrieves a list of instructions for the specified language.
      parameters:
        - name: lang
          in: query
          description: Language code
          required: true
          schema:
            type: string
          example: de-CH
      responses:
        '200':
          description: Returns the list of instructions.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InstructionDto'
      security:
        - ApiKey: [ ]
  /v1/Dsp/languages:
    get:
      tags:
        - instructions
        - prevention
      summary: Get languages
      description: Retrieves a list of available languages for instructions.
      responses:
        '200':
          description: Returns the list of available languages.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LanguageDto'
      security:
        - ApiKey: [ ]
  /v1/Dsp/jobprofiles:
    get:
      tags:
        - instructions
        - prevention
      summary: Get job profiles
      description: Retrieves a list of job profiles for the specified language.
      parameters:
        - name: lang
          in: query
          description: Language code
          required: true
          schema:
            type: string
          example: de-CH
      responses:
        '200':
          description: Returns the list of job profiles.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/KeyValueItemFieldDto'
      security:
        - ApiKey: [ ]
  /v1/Dsp/professionalFields:
    get:
      tags:
        - instructions
        - prevention
      summary: Get professional fields
      description: Retrieves a list of professional fields for the specified language.
      parameters:
        - name: lang
          in: query
          description: Language code
          required: true
          schema:
            type: string
          example: de-CH
      responses:
        '200':
          description: Returns the list of professional fields.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/KeyValueItemFieldDto'
      security:
        - ApiKey: [ ]
  /v1/Dsp/authors:
    get:
      tags:
        - instructions
        - prevention
      summary: Get authors
      description: Retrieves a list of authors for the specified language.
      parameters:
        - name: lang
          in: query
          description: Language code
          required: true
          schema:
            type: string
          example: de-CH
      responses:
        '200':
          description: Returns the list of authors.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/KeyValueItemFieldDto'
      security:
        - ApiKey: [ ]
  /v1/Dsp/scormformats:
    get:
      tags:
        - instructions
        - prevention
      summary: Get SCORM formats
      description: Retrieves a list of SCORM formats for the specified language.
      parameters:
        - name: lang
          in: query
          description: Language code
          required: true
          schema:
            type: string
          example: de-CH
      responses:
        '200':
          description: Returns the list of SCORM formats.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/KeyValueItemFieldDto'
      security:
        - ApiKey: [ ]
  /v1/Dsp/types:
    get:
      tags:
        - instructions
        - prevention
      summary: Get instruction types
      description: Retrieves a list of instructions types for the specified language.
      parameters:
        - name: lang
          in: query
          description: Language code
          required: true
          schema:
            type: string
          example: de-CH
      responses:
        '200':
          description: Returns the list of instruction types.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/KeyValueItemFieldDto'
      security:
        - ApiKey: [ ]
components:
  schemas:
    ImageFields:
      type: object
      properties:
        imageSetImageDefault:
          $ref: '#/components/schemas/ImageValueParent'
        imageSetImageM:
          $ref: '#/components/schemas/ImageValueParent'
        imageSetImageS:
          $ref: '#/components/schemas/ImageValueParent'
        imageSetImageXl:
          $ref: '#/components/schemas/ImageValueParent'
        imageSetImageXs:
          $ref: '#/components/schemas/ImageValueParent'
        imageSetImageL:
          $ref: '#/components/schemas/ImageValueParent'
      additionalProperties: false
    ImageValue:
      type: object
      properties:
        src:
          type: string
          nullable: true
        alt:
          type: string
          nullable: true
        width:
          type: string
          nullable: true
        height:
          type: string
          nullable: true
      additionalProperties: false
    ImageValueParent:
      type: object
      properties:
        value:
          $ref: '#/components/schemas/ImageValue'
      additionalProperties: false
    InstructionDto:
      title: BaseInstruction
      type: object
      properties:
        uniqueId:
          type: string
          description: Unique identifier of the instruction.
          nullable: true
        id:
          type: string
          description: Unique identifier of the instruction as a GUID.
          format: uuid
        language:
          type: string
          description: Language code of the instruction.
          nullable: true
        type:
          type: string
          description: Type of the instruction.
          nullable: true
        title:
          type: string
          description: Title of the instruction.
          default: ''
          nullable: true
        subTitle:
          type: string
          description: Subtitle of the instruction.
          default: ''
          nullable: true
        description:
          type: string
          description: Description of the instruction.
          default: ''
          nullable: true
        jobprofile:
          type: array
          items:
            type: string
          description: Job profiles associated with the instruction.
          nullable: true
        branchen:
          type: array
          items:
            type: string
          description: Industries associated with the instruction.
          nullable: true
        author:
          type: string
          description: Author of the instruction.
          nullable: true
        instruktionstypen:
          type: array
          items:
            type: string
          description: Instruction types associated with the instruction.
          nullable: true
        gueltigkeitsdauer:
          type: integer
          description: Validity duration of the instruction in days.
          format: int32
        lastUpdateDate:
          type: string
          description: Last update date of the instruction.
          format: date-time
        issueDate:
          type: string
          description: Issue date of the instruction.
          format: date-time
        durchfuehrungsdauer:
          type: integer
          description: Course duration of the instruction in minutes.
          format: int32
        contentType:
          type: string
          description: Content Type of the instruction.
          nullable: true
        vimeoId:
          type: integer
          description: Vimeo ID of the video instruction.
          format: int64
        image:
          $ref: '#/components/schemas/ResponsiveImageSetViewModel'
        scormFormat:
          type: string
          description: SCORM format of the e-learning instruction.
          nullable: true
        linkToFile:
          type: string
          description: Link to the e-learning file.
          nullable: true
      additionalProperties: false
      description: 'Base class for instruction data transfer objects, containing common properties.'
    KeyValueItemFieldDto:
      title: KeyValueItemField
      required:
        - id
        - name
      type: object
      properties:
        id:
          type: string
          description: Unique identifier of the field item.
          nullable: true
        name:
          type: string
          description: Name of the field item.
          nullable: true
        revision:
          type: string
          description: Revision identifier of the field item.
          nullable: true
        lastUpdateDate:
          type: string
          description: Last update date of the field item.
          format: date-time
          nullable: true
      additionalProperties: false
      description: 'Represents a key-value pair for a field item, typically used for categorizing or filtering content (e.g., industries, topics).'
    LanguageDto:
      title: Language
      required:
        - code
      type: object
      properties:
        code:
          type: string
          description: Language code.
          nullable: true
      additionalProperties: false
      description: Represents a language with its code.
    ResponsiveImageSetViewModel:
      title: ResponsiveImageSet
      required:
        - url
      type: object
      properties:
        id:
          type: string
          description: Unique identifier of the image set.
          format: uuid
        url:
          type: string
          description: URL of the image set.
          nullable: true
        fields:
          $ref: '#/components/schemas/ImageFields'
      additionalProperties: false
      description: Represents a responsive image set for use in instructions.
  securitySchemes:
    ApiKey:
      type: apiKey
      description: ApiKey must appear in header
      name: X-API-KEY
      in: header
security:
  - X-API-KEY: [ ]
tags:
  - name: instructions
    description: 'API for managing and retrieving instructions related data, including job profiles and professional fields.'